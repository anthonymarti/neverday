<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neverday</title>
<style>
  :root{
    --ink:#0A0A0A;
    --paper:#FAFAF8;
    --mute:#8A8A86;
    --line:rgba(255,255,255,0.10);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
  }

  /* ---- shell ---- */
  .wrap{
    flex:1;
    display:flex;
    flex-direction:column;
    max-width:1200px;
    width:100%;
    margin:0 auto;
    padding:40px clamp(24px,6vw,72px);
  }

  /* ---- top bar ---- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    opacity:0;
    animation:rise .9s cubic-bezier(.16,1,.3,1) .15s forwards;
  }
  .wordmark{
    font-size:25px;
    font-weight:600;
    padding-left:.42em;
  }
  .tag{
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--mute);
  }
  @media(max-width:560px){.tag{display:none}}

  /* ---- hero ---- */
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:clamp(40px,6vh,72px);
    padding:64px 0;
  }
  .mark{
    width:clamp(96px,16vw,168px);
    height:clamp(96px,16vw,168px);
    opacity:0;
    transform:scale(.82) rotate(-90deg);
    animation:markIn 1.4s cubic-bezier(.16,1,.3,1) .35s forwards;
  }
  .mark svg{display:block;width:100%;height:100%}
  .mark .spin{transform-origin:50% 50%;animation:spin 60s linear infinite}

  .headline{
    font-size:clamp(34px,7vw,76px);
    font-weight:600;
    line-height:1.02;
    letter-spacing:-.022em;
    max-width:13ch;
  }
  .headline span{
    display:block;
    color:var(--mute);
    font-weight:300;
  }
  .lede{
    font-size:clamp(16px,2.1vw,20px);
    line-height:1.5;
    color:var(--mute);
    max-width:42ch;
    letter-spacing:-.01em;
  }
  .headline,.lede{opacity:0;animation:rise 1s cubic-bezier(.16,1,.3,1) forwards}
  .headline{animation-delay:.6s}
  .lede{animation-delay:.78s}

  .cta{
    display:inline-flex;
    align-items:center;
    gap:.6em;
    font-size:15px;
    font-weight:600;
    letter-spacing:-.01em;
    color:var(--ink);
    background:var(--paper);
    padding:15px 28px;
    border-radius:999px;
    text-decoration:none;
    opacity:0;
    animation:rise 1s cubic-bezier(.16,1,.3,1) .96s forwards;
    transition:transform .35s cubic-bezier(.16,1,.3,1),background .35s;
  }
  .cta:hover{transform:translateY(-2px)}
  .cta .arr{transition:transform .35s cubic-bezier(.16,1,.3,1)}
  .cta:hover .arr{transform:translateX(4px)}
  .cta:focus-visible{outline:2px solid var(--paper);outline-offset:4px}

  /* ---- footer ---- */
  footer{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-top:32px;
    border-top:1px solid var(--line);
    font-size:13px;
    letter-spacing:.04em;
    color:var(--mute);
    opacity:0;
    animation:rise 1s cubic-bezier(.16,1,.3,1) 1.1s forwards;
  }
  footer a{color:var(--mute);text-decoration:none;transition:color .3s}
  footer a:hover{color:var(--paper)}
  footer a:focus-visible{outline:2px solid var(--paper);outline-offset:3px;color:var(--paper)}
  .links{display:flex;gap:28px}
  @media(max-width:560px){
    footer{flex-direction:column;gap:18px;align-items:flex-start}
  }

  /* ---- motion ---- */
  @keyframes rise{to{opacity:1;transform:none}}
  @keyframes markIn{to{opacity:1;transform:scale(1) rotate(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(prefers-reduced-motion:reduce){
    *{animation:none!important;opacity:1!important;transform:none!important}
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="wordmark">neverday</div>
      <div class="tag">Creative Studio · KC</div>
    </header>

    <main>
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <g class="spin" fill="var(--paper)">
            <rect x="42.5" y="8" width="15" height="84" transform="rotate(30 50 50)"/>
            <rect x="42.5" y="8" width="15" height="84" transform="rotate(-30 50 50)"/>
            <rect x="8" y="42.5" width="84" height="15"/>
          </g>
        </svg>
      </div>

      <h1 class="headline">Brands that refuse<span>to blend in.</span></h1>

      <p class="lede">A two-person studio building maximal web, identity, and motion for restaurants and local makers who'd rather be unforgettable.</p>

      <a class="cta" href="mailto:hello@neverday.com">Start a project <span class="arr">→</span></a>
    </main>

    <footer>
      <div>© 2026 Neverday</div>
      <div class="links">
        <a href="mailto:hello@neverday.com">hello@neverday.com</a>
        <a href="https://instagram.com/neverdaystudio">Instagram</a>
      </div>
    </footer>
  </div>
</body>
</html>
